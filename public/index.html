<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>iSchool Neo4j Project with D3</title>
    <script src="assets/js/d3.v7.min.js" defer></script>
    <script src="assets/js/graph.js" defer></script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <svg></svg>
    <select id="cypher-query">
      <option
        value="MATCH (m:Movie)-[r:IN_GENRE]->(g:Genre {name: 'Sport'}) RETURN m,r,g LIMIT 50"
      >
        Sport Movies
      </option>

      <option value="MATCH (n)-[r]->(m) RETURN n,r,m LIMIT 25">
        All relationships
      </option>
    </select>

    <input type="button" value="Run Query" id="query-btn" />
  </body>
</html>
